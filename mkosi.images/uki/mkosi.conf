[Output]
ImageId=kde-linux
SplitArtifacts=uki
Format=uki
ElTorito=no

[Content]
BaseTrees=../../buildstream-initrdfs
UnifiedKernelImages=yes
KernelInitrdModules=default
Bootloader=uki
Bootable=yes
MakeInitrd=yes
KernelCommandLine=
    rw rootflags=subvol=@system,compress=zstd:-4,lazytime
    lsm=landlock,lockdown,yama,integrity,bpf
    zswap.enabled=0
    preempt=full threadirqs
    nohz=on nohz_full=all
    rcu_nocbs=all rcutree.enable_rcu_lazy=1
    amdgpu.dcdebugmask=0x10
    systemd.hostname=kde-linux
    nowatchdog
    verbose
    systemd.debug-shell=on SYSTEMD_SULOGIN_FORCE=1 rd.systemd.debug_shell=on
