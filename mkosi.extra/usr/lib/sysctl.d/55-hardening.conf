# Answer SYN floods with cryptographic cookies instead of queuing state, so the
# listen backlog can't be exhausted to deny service to legitimate clients.
# https://docs.kernel.org/networking/ip-sysctl.html
net.ipv4.tcp_syncookies = 1

# Drop RSTs that arrive during TIME-WAIT, closing the "TIME-WAIT assassination"
# hole where a stray or forged RST lets a new connection reuse the port too soon.
# https://docs.kernel.org/networking/ip-sysctl.html
# https://datatracker.ietf.org/doc/html/rfc1337
net.ipv4.tcp_rfc1337 = 1

# Don't reply to ICMP echo aimed at a broadcast address, so this host can't be
# recruited as an amplifier in a Smurf-style DoS reflection attack.
# https://docs.kernel.org/networking/ip-sysctl.html
net.ipv4.icmp_echo_ignore_broadcasts = 1

# Ignore ICMP error replies that violate RFC 1122; they come from broken routers
# and only serve to spam the logs.
# https://docs.kernel.org/networking/ip-sysctl.html
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Drop TCP timestamps, which otherwise leak system uptime and help an attacker
# fingerprint the host or count machines hiding behind a single NAT.
# https://docs.kernel.org/networking/ip-sysctl.html
net.ipv4.tcp_timestamps = 0

# Reverse-path filter: drop a packet if the kernel wouldn't route a reply back
# out the way it came, which defeats source-address spoofing.
# Loose mode (2), not strict (1): keeps VPNs and asymmetric routing working
# https://docs.kernel.org/networking/ip-sysctl.html
net.ipv4.conf.all.rp_filter = 2
net.ipv4.conf.default.rp_filter = 2

# Only routers should emit ICMP redirects; a host doing so leaks topology and
# serves no purpose, so turn it off.
# https://docs.kernel.org/networking/ip-sysctl.html
net.ipv4.conf.*.send_redirects = 0

# Refuse incoming ICMP redirects: accepting them lets anyone on the local segment
# rewrite our routing table and silently man-in-the-middle our traffic.
# https://docs.kernel.org/networking/ip-sysctl.html
net.ipv4.conf.*.accept_redirects = 0
net.ipv6.conf.*.accept_redirects = 0

# Reject source-routed packets: source routing lets the sender dictate the return
# path, a classic spoofing/bypass trick with no legitimate modern use.
# https://docs.kernel.org/networking/ip-sysctl.html
net.ipv4.conf.*.accept_source_route = 0
net.ipv6.conf.*.accept_source_route = 0

# IPv6 privacy extensions: use rotating temporary addresses for outbound traffic
# so connections can't be tied back to the stable, hardware-derived address.
# https://docs.kernel.org/networking/ip-sysctl.html
net.ipv6.conf.all.use_tempaddr = 2
net.ipv6.conf.default.use_tempaddr = 2

# Log packets with impossible ("martian") source addresses so spoofing attempts
# leave a trail for monitoring and forensics.
# https://docs.kernel.org/networking/ip-sysctl.html
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Blind constants in JIT-compiled BPF so an attacker can't smuggle executable
# gadgets through the JIT (JIT-spray); 2 applies the hardening even for root.
# https://docs.kernel.org/admin-guide/sysctl/net.html#bpf-jit-harden
net.core.bpf_jit_harden = 2

# Restrict ptrace to direct descendants, so a compromised process can't read the
# memory or scrape secrets/credentials of unrelated running processes.
# https://www.kernel.org/doc/html/latest/admin-guide/LSM/Yama.html
kernel.yama.ptrace_scope = 1

# Keep the large, exploit-prone eBPF surface out of unprivileged hands; only
# privileged users can load BPF programs.
# https://docs.kernel.org/admin-guide/sysctl/kernel.html#unprivileged-bpf-disabled
kernel.unprivileged_bpf_disabled = 1

# Lock unprivileged users out of the perf subsystem (a recurring source of local
# privilege-escalation bugs) while still allowing user-space profiling.
# 2 not 3: value 3 needs a patched kernel and blocks profilers / eBPF tools
# https://docs.kernel.org/admin-guide/sysctl/kernel.html#perf-event-paranoid
kernel.perf_event_paranoid = 2

# Hide kernel pointers from everyone (even root) in /proc and friends, denying
# attackers the address leaks they need to defeat KASLR.
# https://docs.kernel.org/admin-guide/sysctl/kernel.html#kptr-restrict
kernel.kptr_restrict = 2

# Restrict the kernel ring buffer to privileged users; dmesg routinely contains
# addresses and other detail useful for building an exploit.
# https://docs.kernel.org/admin-guide/sysctl/kernel.html#dmesg-restrict
kernel.dmesg_restrict = 1

# Panic once this many oopses pile up. Some exploits oops on each failed attempt
# and simply retry, so a low ceiling kills the box before a brute-force lands.
# https://docs.kernel.org/admin-guide/sysctl/kernel.html#oops-limit
kernel.oops_limit=100

# Same reasoning for kernel warnings, which several exploit techniques spam while
# probing: cap how many they get before the kernel gives up and panics.
# https://docs.kernel.org/admin-guide/sysctl/kernel.html#warn-limit
kernel.warn_limit=100

# Reboot 30s after a panic so an unattended machine recovers on its own.
# 30s, not -1: keeps the panic message readable and avoids a boot reboot-loop
# https://docs.kernel.org/admin-guide/sysctl/kernel.html#panic
kernel.panic=30

# Quiet the console to high-priority messages only, so kernel addresses and other
# internals don't scroll past (readable by anyone watching) during boot.
# https://docs.kernel.org/admin-guide/sysctl/kernel.html#printk
kernel.printk = 3 3 3 3

# Disable kexec so an attacker who reaches root still can't hot-swap the running
# kernel for a malicious one, bypassing Secure Boot and persisting stealthily.
# https://docs.kernel.org/admin-guide/sysctl/kernel.html#kexec-load-disabled
kernel.kexec_load_disabled = 1

# Restrict io_uring for non-authorised users (1): it has been a prolific source of kernel
# vulnerabilities and a favorite exploit primitive, so the safest choice is complicating access.
# https://lore.kernel.org/lkml/20230629132711.1712536-1-matteorizzo@google.com/T/
# https://security.googleblog.com/2023/06/learnings-from-kctf-vrps-42-linux.html
# https://docs.kernel.org/admin-guide/sysctl/kernel.html#io-uring-disabled
kernel.io_uring_disabled = 1

# Full ASLR: randomize stack, heap, mmap and VDSO placement so attackers can't
# rely on fixed addresses for ROP / return-to-libc style exploitation.
# https://docs.kernel.org/admin-guide/sysctl/kernel.html#randomize-va-space
# Default in Fedora, including for runtime audit
kernel.randomize_va_space = 2

# Never core-dump setuid programs; their memory can hold secrets that would
# otherwise land in a dump readable by the unprivileged user who invoked them.
# https://docs.kernel.org/admin-guide/sysctl/fs.html#suid-dumpable
fs.suid_dumpable = 0

# Block opening regular files for writing in world-writable sticky dirs (e.g.
# /tmp) you don't own, killing a class of file-squatting / race attacks.
# 1 (systemd default), not 2: value 2 occasionally trips sloppy software
# https://docs.kernel.org/admin-guide/sysctl/fs.html#protected-regular
fs.protected_regular = 1

# Same protection for FIFOs in shared dirs, so a planted pipe can't be used to
# hijack a privileged process that opens it.
# 1 (systemd default), not 2
# https://docs.kernel.org/admin-guide/sysctl/fs.html#protected-fifos
fs.protected_fifos = 1

# Only let users hardlink to files they can already read and write, defeating
# hardlink tricks that hand a process access to a file it shouldn't reach.
# https://docs.kernel.org/admin-guide/sysctl/fs.html#protected-hardlinks
# Default in Fedora, including for runtime audit
fs.protected_hardlinks = 1

# In sticky world-writable dirs, only follow symlinks owned by the follower,
# shutting down the classic /tmp symlink-swap (TOCTOU) attack.
# https://docs.kernel.org/admin-guide/sysctl/fs.html#protected-symlinks
# Default in Fedora, including for runtime audit
fs.protected_symlinks = 1

# Stop unprivileged users from auto-loading TTY line-discipline modules; several
# of those modules have shipped privilege-escalation bugs, so don't expose them.
# https://lkml.org/lkml/2019/4/15/890
dev.tty.ldisc_autoload = 0

# Gate userfaultfd behind CAP_SYS_PTRACE: handling page faults in user space is a
# go-to primitive for winning the race windows in use-after-free exploits.
# https://docs.kernel.org/admin-guide/sysctl/vm.html#unprivileged-userfaultfd
vm.unprivileged_userfaultfd = 0

# Forbid mapping the lowest 64KB of address space, so a kernel NULL-pointer
# dereference can't be steered into attacker-controlled memory at address 0.
# https://docs.kernel.org/admin-guide/sysctl/vm.html#mmap-min-addr
vm.mmap_min_addr = 65536

# Raise the per-process VMA cap; many modern apps and games (especially under
# Proton/Wine) map enough regions to hit the old default and crash. This one is
# for compatibility, not hardening.
# https://docs.kernel.org/admin-guide/sysctl/vm.html#max-map-count
# Default in Fedora, including for runtime audit
vm.max_map_count = 1048576