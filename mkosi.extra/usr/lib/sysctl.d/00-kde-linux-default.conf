# With fast RAM-backed swap (zram), tell the kernel it's faster than I/O so it
# doesn't use slower file pages as often
vm.swappiness = 180
# Read-ahead is unneeded with zram
vm.page-cluster = 0
# Defragging is unneeded with zram
vm.watermark_boost_factor = 0
# Make kswapd more aggressive because zram is cheap
vm.watermark_scale_factor = 125
# Many Windows games need this disabled to run with proper performance; they abuse split locks
kernel.split_lock_mitigate = 0
# Not needed for us; disabling it increases speed and reduces power consumption
kernel.nmi_watchdog = 0
# Disable kexec as a security measure
kernel.kexec_load_disabled=1
# Restrict access to kernel pointers as a security measure
kernel.kptr_restrict=1
# Set to 'fq' to prevent one greedy app from causing lag (bufferbloat) for everything else
net.core.default_qdisc = fq
# Increase to handle sudden traffic spikes on fast networks without dropping packets
net.core.netdev_max_backlog = 16384
# Switch to 'bbr' to achieve higher throughput and lower latency on modern networks
net.ipv4.tcp_congestion_control = bbr
# Enable to make web pages and APIs very slightly snappier by reducing initial connection latency
net.ipv4.tcp_fastopen = 3
