[zram0]
# Allow up to $RAMSIZE memory to be compressed. With e.g a 3:1 compression
# ratio, this would mean that up to 1/3 of physical RAM would be filled with
# compressed memory, effectively giving us 66% more memory at only the cost
# of some CPU time.
# We don't go over 100% because while in principle this should allow
# doubling or tripling the effective memory (depending on the chosen
# compression algorithm), in practice freezes occur earlier because not all
# memory is compressible and the system runs out of uncompressed physical
# RAM before zram is actually close to full, so systemd's userspace OOM
# killer doesn't run.
zram-size = ram

# zstd has the best compression (roughly 3:1 for level 1, which we use here),
# which is massively important when using zram. We want to reap the biggest
# win we can from compression without filling too much of the physical RAM.
# LZ4 is faster, but its worse compression makes for a bad trade-off here.
compression-algorithm = zstd
