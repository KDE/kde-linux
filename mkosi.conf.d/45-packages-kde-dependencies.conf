# Only add packages here if they have a valid reason to remain optional
# dependencies of KDE software. If there is no valid reason, instead add
# them to
# https://invent.kde.org/sysadmin/repo-metadata/-/blob/master/distro-dependencies/arch.yaml

[Content]

Packages=
    accountsservice # Users KCM
    aha # kinfocenter
    aspell # sonnet
    bluez-obex # Bluetooth file sharing, through the KCM
    bup # kup, for one of the backends
    clinfo # kinfocenter
    cryfs # plasma-vault, for compatibility
    ddcutil # For DDC/CI external monitors brightness in powerdevil
    dmidecode # kinfocenter
    editorconfig-core-c # ktexteditor
    encfs # plasma-vault, for compatibility
    ffmpeg # ffmpegthumbs
    fwupd # for Discover backend
    geoclue # Night Light automatic location mode
    gocryptfs # plasma-vault, for new vaults
    hspell # sonnet
    hunspell # sonnet and KRunner's spellchecker plugin
    jxrlib # kimageformats
    libappimage # kio-extras, for AppImage app thumbnails
    libappindicator-gtk3 # plasma-desktop, for tray icon support in GTK 3 apps
    libavif # kimageformats
    libdbusmenu-gtk3 # plasma-desktop, for global menu support in GTK 3 apps
    libheif # kimageformats
    libjxl # kimageformats
    libraw # kimageformats
    mesa-utils # Provides both eglinfo and glxinfo, used by kinfocenter
    opencv # spectacle
    openexr # kimageformats
    qt6-multimedia-ffmpeg # ffmpeg backend for qt6-multimedia, used in Dolphin, Konsole, Spectacle, and Prison
    rsync # kup, for one of the backends
    switcheroo-control # kio, for launching apps on non-default GPU
    tesseract-data-eng # Tesseract requires at least one language backend
    tesseract # Spectacle OCR
    unrar # ark RAR decompression support
    vulkan-tools # Provides vulkaninfo, used by kinfocenter
    wayland-utils # Provides wayland-info, used by kinfocenter
    xorg-xdpyinfo # kinfocenter X11 info tab (including xwayland)
