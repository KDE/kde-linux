# Base system. Things we'll probably never want to remove no matter how
# much we strip it down and move content into Kapsule or elsewhere.

[Content]
Packages=
    # Base system: bootloader, kernel, firmware, and low-level libraries
    amd-ucode
    edk2-shell
    efibootmgr
    flatpak
    glibc-locales # instead of running locale-gen as part of our build we install a package that has all locales pre-generated
    intel-ucode
    kernel-modules-hook
    kmod
    kmscon # modern userspace getty and virtual terminal replacement
    linux-atm
    linux-firmware
    linux-zen-headers # For DKMS
    linux-zen # Improved Kernel
    mokutil # To manage the Machine Owner Key (MOK) list for Shim (only for advanced users)
    plymouth
    realtime-privileges # `realtime` group and realtime privileges for processes using it
    sbsigntools # To sign and verify EFI binaries
    shim # Sits between firmware and systemd-boot, providing a trusted boot path and support for Secure Boot
    systemd
    systemd-resolvconf
    systemd-sysvcompat
    systemd-ukify
    xdg-user-dirs
    zram-generator # use compressed zram for swap

    # HW enablement: graphics
    libva # Hardware accelerated video in general
    libva-intel-driver # Hardware accelerated video on old Intel GPUs
    libva-mesa-driver # Hardware accelerated video on AMD GPUs

    mesa
    vpl-gpu-rt # Hardware accelerated video on newer Intel GPUs
    vulkan-icd-loader
    vulkan-intel
    vulkan-radeon
    vulkan-swrast # Vulkan for old GPUs and some Virtual Machines

    # HW enablement: audio
    sof-firmware # Various audio chipset


    # Base system: CLI tools that need to be on the base image; and why
    acpid # acpi daemon; unclear
    base # Base Arch packages; mandatory
    btrfsmaintenance # Provides Systemd Services for BTRFS Operations like scrubbing and balancing
    btrfs-progs # Btrfs tools; so system tools can interact with our disks
    busybox # Tiny rescue tools; for emergencies
    erofs-utils # Erofs tools; so system tools can interact with our OS image
    inotify-tools # ; for kmscon-launch-gui waiting mechanism
    dosfstools # Manipulating DOS filesystems; used by kpmcore
    e2fsprogs  # Manipulating EXT filesystems; used by kpmcore
    exfatprogs # Manipulating exFAT filesystems; used by kpmcore
    f2fs-tools # Manipulating f2fs filesystems; used by kpmcore
    fatresize # Resizing FAT filesystems; used by kpmcore
    ntfs-3g # access ntfs partitions; used by kpmcore
    xfsprogs # Manipulating XFS filesystems; used by kpmcore
    ydotool # Basic TUI and GUI app automation; needs low-level access to work
        # Candidates for removal once we have Kapsule-by-default: dev tools
    base-devel
    bc # used during kernel builds
    clazy
    cmake
    crun # default for podman
    edk2-ovmf
    gperf # optional make dependency for kio-extras
    intltool # make dependency for purpose, plasma-desktop, and kio-gdrive
    meson # often used for glib software as alternative to cmake
    ninja
    perf
    perl-uri # make dependency for kdoctools
    python-atspi # For selenium
    python-lxml # make dependency for breeze-icons
    reuse # optional make dependency for a bunch of KDE projects
    sassc # make dependency for breeze-gtk and kde-gtk-config
    strace # instrument running executables
    systemd-bootchart # Boot profiling tools
    subversion # VCS needed for cloning old repos that don't use git
    vulkan-headers # make dependency for kinfocenter
    xerces-c # optional make dependency for syntax-highlighting
    xz

    # Candidates for removal once we have Kapsule-by-default: tools for
    # building KDE Linux itself
    arch-install-scripts
    boost
    boost-libs
    cmake
    glib2-devel
    mkinitcpio
    mkinitcpio-systemd-tool
    pacman
    python-setproctitle # For kde-builder
    python-yaml # For kde-builder
    ruby # For the torrent script in the repo
    ruby-stdlib # really small useful bundles, tools, stdlib etc. for ruby
    yaml-cpp

