# Base system. Things we'll probably never want to remove no matter how
# much we strip it down and move content into Kapsule or elsewhere.

[Content]
Packages=
    # Base system: bootloader, kernel, firmware, and low-level libraries
    amd-ucode
    edk2-shell # UEFI shell
    flatpak
    glibc-locales # instead of running locale-gen as part of our build we install a package that has all locales pre-generated
    intel-ucode
    kernel-modules-hook
    kmod
    kmscon # modern userspace getty and virtual terminal replacement
    linux-firmware
    linux-headers # For DKMS
    linux # It's the kernel!
    plymouth
    realtime-privileges # `realtime` group and realtime privileges for processes using it
    shim # Sits between firmware and systemd-boot, providing a trusted boot path and support for Secure Boot
    systemd
    systemd-resolvconf
    systemd-sysvcompat
    systemd-ukify
    xdg-user-dirs
    zram-generator # use compressed zram for swap

    # HW enablement: graphics
    libva # Hardware accelerated video in general
    libva-intel-driver # Hardware accelerated video on old Intel GPUs
    libva-mesa-driver # Hardware accelerated video on AMD GPUs
    libva-nvidia-driver # Hardware accelerated video on NVIDIA GPUs
    mesa
    nvidia-open # Open kernel modules for NVIDIA GPUs w/ vulkan support
    vpl-gpu-rt # Hardware accelerated video on newer Intel GPUs
    vulkan-icd-loader
    vulkan-intel
    vulkan-radeon
    vulkan-swrast # Vulkan for old GPUs and some Virtual Machines

    # HW enablement: audio
    sof-firmware # Various audio chipsets

    ## HW enablement: printing
    cups # Basic printing infrastructure
    cups-browsed # Pre-2012 network printer auto-discovery
    foomatic-db # data about many printers for for foomatic-db-engine PPD generator
    gutenprint # FOSS drivers for lots of pre-2012 printers
    hplip # Pre-2012 HP printers
    ipp-usb # Connect to post-2012 driverless printers over USB
    system-config-printer # Local printer auto-discovery

    # HW enablement: other
    acsccid # ACS CCID smart card readers
    android-udev # udev rules for accessing Android devices
    bmusb # Specialty video capture/playback boxes from BlackMagicDesign
    ccid # Generic USB CCID/ICCD card readers
    fprintd # Fingerprint authentication
    iio-sensor-proxy # Auto-rotation
    linux-apfs-rw-dkms # Experimental APFS kernel module with Write support
    linux-firmware-marvell # Firmware files for marvell products
    lvm2 # Logical Volume Manager 2 support
    openrazer-daemon # Drivers etc. for Razer hardware
    pam-u2f # 2nd factor PAM support for Yubikey hardware authenticators
    powertop # Energy monitoring; also used in our energy tuning scripts
    sane # scanner udev rules - everything else in the package is deleted later
    solaar # Logitech Unify reciever udev rules - everything else in the package is deleted later
    steam-devices # udev rules for devices usable with Steam and SteamVR
    thermald # Improved thermal management and performance for Intel CPUs
    tpm2-tss # TPM support
    tuned-ppd # Power profiles
    udev-hid-bpf # Many drawing tablets
    udisks2-btrfs # support for Btrfs in udisks
    usb_modeswitch # WiFi dongles that have a flash storage mode preventing use OOTB
    usbmuxd # Apple iOS devices via USB
    vhba-module # DKMS for Virtual SCSI adapter
    v4l2loopback-utils # v4l2loopback dkms and tools for virtual Camera functionality in certain applications
    wireless-regdb # Gets us the wireless-regdom file that we can modify as needed
    yubikey-full-disk-encryption # Support for unlocking a FDE LUKS partition with Yubikey hardware authenticators

    # Base system: CLI tools that need to be on the base image; and why
    base # Base Arch packages; mandatory
    btrfsmaintenance # Provides Systemd Services for BTRFS Operations like scrubbing and balancing
    btrfs-progs # Btrfs tools; so system tools can interact with our disks
    efibootmgr # EFI dump/management tools; needs low-level access to work
    erofs-utils # Erofs tools; so system tools can interact with our OS image
    inotify-tools # ; for kmscon-launch-gui waiting mechanism
    dosfstools # Manipulating DOS filesystems; used by kpmcore
    e2fsprogs  # Manipulating EXT filesystems; used by kpmcore
    exfatprogs # Manipulating exFAT filesystems; used by kpmcore
    f2fs-tools # Manipulating f2fs filesystems; used by kpmcore
    fatresize # Resizing FAT filesystems; used by kpmcore
    mokutil # To manage the Machine Owner Key (MOK) list for Shim (only for advanced users); needs low-level access to work
    ntfs-3g # access ntfs partitions; used by kpmcore
    nvidia-prime # prime-run command; used in kio via Dolphin, Plasma, KRunner
    sbsigntools # To sign and verify EFI binaries; needs low-level access to work
    xfsprogs # Manipulating XFS filesystems; used by kpmcore
    ydotool # Basic TUI and GUI app automation; needs low-level access to work

    # Virtualization/VM integration
    dnsmasq # Hotspot creation and networking in VMs
    edk2-ovmf # UEFI support for virtual machines
    open-vm-tools # Integration for VMWare virtualization software
    qemu-guest-agent # Integration for QEMU
    spice-vdagent # QEMU's SPICE counterpart to enable desktop integration (e.g. clipboard sharing, dynamic resolution, etc)
    swtpm # TPM emulator used by Incus VMs
    virtiofsd # Enables access to host folders from virt-manager and incus VMs
    virtualbox-guest-utils # integration for VirtualBox
