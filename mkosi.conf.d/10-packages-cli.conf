# Modern CLI tools!

[Content]
Packages=
    alsa-utils # alsamixer and other useful audio debugging tools
    bash-completion
    bat
    bluez-utils # useful Bluetooth CLI tools
    cpupower # For more granular tuning of CPU limits
    desktop-file-utils # desktop-file-validate and related useful tools
    drm-info # for debugging KWin and other graphics issues
    duf
    ex-vi-compat
    fastfetch
    fd
    fzf
    git
    git-lfs # Git extension needed for versioning large files
    gping
    htop
    iotop # Fancy disk usage monitoring
    iw # Kernel-level wireless configuration
    jq
    kdialog # custom dialogs for automation
    less
    libva-utils # CLI tools for interacting with and debugging GPU acceleration
    lshw # fancy hardware listing
    lsof
    man-db # Classic `man`
    man-pages # Manual pages for things
    mcfly
    nano
    nvidia-prime # prime-run command
    nvtop # Fancy GPU monitoring
    openssh
    plocate # Fast file locating
    powertop
    procs
    ripgrep
    systemd-bootchart # Boot profiling tools
    tldr
    trash-cli # safer way to remove files from the CLI
    tree
    turbostat # Reports processor frequency and idle statistics
    unzip # the `unzip` CLI unarchiving tool
    usbutils # `lsusb` and other useful troubleshooting tools
    vim
    wget
    wireguard-tools # CLI tools for controlling Wireguard VPNs
    wl-clipboard
    words # Dictionaries in /usr/share/dict
    xdg-utils # xdg-open and other useful cross-desktop CLI tools
    ydotool # Basic TUI and GUI app automation
    zip # the `zip` CLI archiving tool
    zsh
    zsh-autosuggestions # fish-like suggestions
    zsh-completions
    zsh-history-substring-search # fish-like history search
    zsh-syntax-highlighting # fish-like syntax highlighting
