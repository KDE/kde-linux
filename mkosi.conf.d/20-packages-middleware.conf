# Libraries, plugins, and tools that sit above the core and directly plug into
# KDE GUI software not shipped using Flatpak. Include this stuff with image
# until and unless we can bundle it all with the GUI software layer somehow.

[Content]
Packages=
    # Networking
    networkmanager-strongswan # VPN support for NetworkManager
    networkmanager-vpn-plugin-l2tp # VPN support for NetworkManager
    networkmanager-vpn-plugin-openconnect # VPN support for NetworkManager
    networkmanager-vpn-plugin-openvpn # VPN support for NetworkManager
    networkmanager-vpn-plugin-pptp # VPN support for NetworkManager
    networkmanager-vpn-plugin-sstp # VPN support for NetworkManager
    networkmanager-vpn-plugin-vpnc # VPN support for NetworkManager
    nfs-utils # Support harness for NFS mounting
    nss-mdns # Needed for Avahi mDNS for local domain resolving etc.
    samba # For sharing local folders via Samba
    ufw # Simple firewall; consider switching to firewalld once the KCM supports zones

    # Audio
    pipewire
    pipewire-alsa # Better default configuration for ALSA, for apps using it directly
    pipewire-ffado # FireWire/IEEE 1394 audio
    pipewire-jack # Compatibility for JACK-using apps
    pipewire-libcamera
    pipewire-pulse
    pipewire-roc # ROC streaming
    pipewire-v4l2 # V4L2 video support
    pipewire-zeroconf
    wireplumber

    # Xorg
    xorg-xwayland

    # Direct optional dependencies of KDE software in the FDO or KDE runtime.
    # Everything here should be listed in the "optdepends" array of something in
    # https://invent.kde.org/sysadmin/repo-metadata/-/blob/master/distro-dependencies/arch.yaml
    geoclue # backend for QtPositioning, used for Night Light automatic location mode
    hunspell # sonnet and KRunner's spellchecker plugin
    hunspell-en_us # hunspell requires at least one language backend; only English for now
    libavif # kimageformats
    libheif # kimageformats
    libjxl # kimageformats
    qt6-multimedia-ffmpeg # ffmpeg backend for qt6-multimedia, used in Dolphin, Konsole, Spectacle, and Prison

    # Direct optional dependencies of KDE software NOT in the FDO or KDE runtime.
    # Everything here should be listed in the "optdepends" array of something in
    # https://invent.kde.org/sysadmin/repo-metadata/-/blob/master/distro-dependencies/arch.yaml
    appmenu-gtk-module # plasma-desktop, for global menu support in GTK 3 apps
    arj # ark, for ARJ archives
    bluez-obex # Bluetooth file sharing, through the KCM
    bup # kup, for one of the backends
    catdoc # kfilemetadata, for indexing old MS word docs
    fwupd # for Discover backend
    jxrlib # kimageformats
    libappimage # kio-extras, for AppImage app thumbnails
    libraw # kimageformats
    lrzip # ark, for lzma, rzip, and zpaq compressed archives
    lzop # ark, for lzo compressed archives
    noto-fonts # Our base font, Noto
    noto-fonts-cjk # Noto CJK scripts
    noto-fonts-emoji # Noto emojis
    openexr # kimageformats
    opus-tools # audiocd-kio, opus encoding
    quota-tools # kdeplasma-addons, for Disk Quota widget
    rsync # kup, for one of the backends
    switcheroo-control # kio, for launching apps on non-default GPU
    tesseract-data-eng # Tesseract requires at least one language backend; only English for now
    tesseract # Spectacle OCR
    unrar # ark, for RAR decompression support
    xdg-desktop-portal-gtk # GTK/Flatpak icon settings syncing
