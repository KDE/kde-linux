# CLI tools.

[Content]
Packages=
    # Basic tools we should always include
    desktop-file-utils # desktop-file-validate and related useful tools
    ex-vi-compat
    iproute2 # Basic networking tools
    iw # Kernel-level wireless configuration
    less
    lsof
    nano
    openssh
    ripgrep
    tree
    unzip # the `unzip` CLI unarchiving tool
    usbutils # `lsusb` and other useful troubleshooting tools
    vim
    wget
    wl-clipboard
    xdg-utils # xdg-open and other useful cross-desktop CLI tools
    zip # the `zip` CLI archiving tool
    zsh
    zsh-autosuggestions # fish-like suggestions
    zsh-completions
    zsh-history-substring-search # fish-like history search
    zsh-syntax-highlighting # fish-like syntax highlighting

    # Candidates for removal once we have Kapsule-by-default: user tools
    alsa-utils # alsamixer and other useful audio debugging tools
    android-tools # Tools for working with Android devices
    bash-completion # Completions for Bash
    bat # Opinionated fancy cat
    bluez-utils # useful Bluetooth CLI tools
    cpupower # For more granular tuning of CPU limits; needs to touch the kernel
    drm-info # for debugging KWin and other graphics issues
    duf # Opinionated fancy df
    espeak-ng # CLI-invoked speech; accessible automation feedback
    fastfetch # For showing off on r/unixporn
    fd # Opinionated fancy find
    fuseiso # Userspace ISO mounting
    fzf # Fuzzy find
    git # It's git
    git-lfs # Git extension needed for versioning large files
    gping # Opinionated fancy ping
    htop # Opinionated fancy top
    inxi # Comprehensive system information
    iotop # Opinionated fancy top for disks
    jq # JSON processor
    libratbag # Inspect and modify configurable mice
    libva-utils # CLI tools for interacting with and debugging GPU acceleration
    lshw # fancy hardware listing
    man-db # Classic `man`
    man-pages # Manual pages for things
    mcfly # Fancy shell history searching
    nvme-cli # NVMe SSD support tooling
    nvtop # Fancy GPU monitoring
    plocate # Fast file locating
    procs # Opinionated fancy ps
    tldr # mini-manpages
    trash-cli # safer way to remove files from the CLI
    turbostat # Reports processor frequency and idle statistics
    udftools # Manipulating optical discs
    wireguard-tools # CLI tools for controlling Wireguard VPNs
    words # Dictionaries in /usr/share/dict
    yubikey-manager # CLI tools for managing Yubikey hardware authenticators

    # Candidates for removal once we have Kapsule-by-default: dev tools
    base-devel
    bc # used during kernel builds
    ccache
    clang
    clazy
    cmake
    crun # default for podman
    distrobox
    docker
    docker-buildx
    docker-compose
    flatpak-builder
    gperf # optional make dependency for kio-extras
    intltool # make dependency for purpose, plasma-desktop, and kio-gdrive
    lldb # debugger for llvm based languages (odin, zig..)
    llvm
    meson # often used for glib software as alternative to cmake
    ninja
    perf
    perl-uri # make dependency for kdoctools
    podman
    podman-compose
    python-atspi # For selenium
    python-lxml # make dependency for breeze-icons
    qemu-desktop
    reuse # optional make dependency for a bunch of KDE projects
    sassc # make dependency for breeze-gtk and kde-gtk-config
    strace # instrument running executables
    systemd-bootchart # Boot profiling tools
    subversion # VCS needed for cloning old repos that don't use git
    toolbox
    vulkan-headers # make dependency for kinfocenter
    xerces-c # optional make dependency for syntax-highlighting
    xz

    # Candidates for removal once we have Kapsule-by-default: tools for
    # building KDE Linux itself
    arch-install-scripts
    boost
    boost-libs
    cmake
    glib2-devel
    mkinitcpio
    mkinitcpio-systemd-tool
    pacman
    python-setproctitle # For kde-builder
    python-yaml # For kde-builder
    ruby # For the torrent script in the repo
    ruby-stdlib # really small useful bundles, tools, stdlib etc. for ruby
    yaml-cpp
